name: CI

on:
  push:
  pull_request:

jobs:
  build:
    name: Build dashboard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm gen
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/dummy?schema=public"

      - name: Build dashboard
        run: pnpm build
